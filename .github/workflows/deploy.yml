name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          EOF

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci

      - name: Build React app
        run: |
          echo "🏗️ Building React app..."
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Deploy to S3
        run: |
          echo "🚀 Syncing to S3..."

          # Hashed assets (JS/CSS) — cache aggressively, browsers re-fetch only when filename changes
          aws s3 sync ./build s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

          # index.html — never cache, so users always get the latest entry point
          aws s3 cp ./build/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

          echo "✅ S3 sync complete"

      - name: Invalidate CloudFront cache
        run: |
          echo "🔄 Invalidating CloudFront..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
          echo "✅ CloudFront invalidation triggered"

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          sleep 15

          if curl -f https://${{ secrets.CLOUDFRONT_DOMAIN }} > /dev/null 2>&1; then
            echo "✅ Frontend is healthy and responding!"
          else
            echo "⚠️ Warning: Frontend may not be responding yet (CDN propagation can take a minute)"
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f .env
          echo "🧹 Cleaned up sensitive files"